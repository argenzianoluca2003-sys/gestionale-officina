<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car-Agri Cloud</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8fb;margin:0;padding:20px;color:#0f172a}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;margin-bottom:16px}
    input,select,button{width:100%;min-height:42px;border-radius:12px;border:1px solid #dbe2ea;padding:10px 12px;font-size:14px;box-sizing:border-box}
    button{background:#0f172a;color:#fff;border:0;cursor:pointer}
    button.secondary{background:#fff;color:#0f172a;border:1px solid #dbe2ea}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1}
    .hidden{display:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .tab{width:auto;padding:10px 14px;border-radius:999px;background:#fff;color:#0f172a;border:1px solid #dbe2ea}
    .tab.active{background:#0f172a;color:#fff}
    .section{display:none}
    .section.active{display:block}
    .status{min-height:20px;margin-top:8px;font-size:13px}
    .error{color:#b91c1c}
    .ok{color:#166534}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #e2e8f0;text-align:left}
    .smallbtn{width:auto;min-height:34px;padding:6px 10px;font-size:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div id="authView" class="card">
    <h2>Accesso</h2>
    <div class="row">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
    </div>
    <div class="row" style="margin-top:10px">
      <button id="loginBtn">Accedi</button>
      <button id="registerBtn" class="secondary">Registrazione</button>
    </div>
    <div id="authStatus" class="status"></div>
  </div>

  <div id="appView" class="hidden">
    <div class="card">
      <div class="row">
        <div><strong id="userEmail"></strong></div>
        <button id="refreshBtn" class="secondary">Aggiorna</button>
        <button id="logoutBtn">Esci</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="clients">Clienti</button>
      <button class="tab" data-tab="suppliers">Fornitori</button>
      <button class="tab" data-tab="articles">Articoli</button>
    </div>

    <div id="clients" class="section active">
      <div class="card">
        <h3>Clienti</h3>
        <div class="row">
          <input id="clientName" placeholder="Nome / ragione sociale">
          <select id="clientType">
            <option value="azienda">Azienda</option>
            <option value="privato">Privato</option>
          </select>
          <input id="clientPhone" placeholder="Telefono">
          <input id="clientVat" placeholder="Partita IVA">
        </div>
        <div class="row" style="margin-top:10px">
          <input id="clientAddress" placeholder="Indirizzo">
          <input id="clientSdi" placeholder="SDI">
          <button id="saveClientBtn">Salva cliente</button>
        </div>
        <div id="clientStatus" class="status"></div>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr><th>Nome</th><th>Tipo</th><th>Telefono</th><th>P.IVA</th><th>Azioni</th></tr>
          </thead>
          <tbody id="clientsTable"></tbody>
        </table>
      </div>
    </div>

    <div id="suppliers" class="section">
      <div class="card">
        <h3>Fornitori</h3>
        <div class="row">
          <input id="supplierName" placeholder="Ragione sociale">
          <input id="supplierContact" placeholder="Referente">
          <input id="supplierPhone" placeholder="Telefono">
          <input id="supplierEmail" placeholder="Email">
          <input id="supplierVat" placeholder="Partita IVA">
        </div>
        <div class="row" style="margin-top:10px">
          <button id="saveSupplierBtn">Salva fornitore</button>
        </div>
        <div id="supplierStatus" class="status"></div>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr><th>Nome</th><th>Referente</th><th>Telefono</th><th>Email</th><th>Azioni</th></tr>
          </thead>
          <tbody id="suppliersTable"></tbody>
        </table>
      </div>
    </div>

    <div id="articles" class="section">
      <div class="card">
        <h3>Articoli</h3>
        <div class="row">
          <input id="articleCode" placeholder="Codice">
          <input id="articleDescription" placeholder="Descrizione">
          <input id="articleBrand" placeholder="Marca">
          <input id="articleCategory" placeholder="Categoria">
        </div>
        <div class="row" style="margin-top:10px">
          <input id="articleUnit" placeholder="Unità" value="pz">
          <input id="articleStock" type="number" placeholder="Giacenza">
          <input id="articleMinStock" type="number" placeholder="Scorta minima">
          <input id="articleSalePrice" type="number" placeholder="Prezzo vendita">
          <input id="articlePurchasePrice" type="number" placeholder="Prezzo acquisto">
        </div>
        <div class="row" style="margin-top:10px">
          <input id="articleLastDate" type="date">
          <select id="articleSupplier"></select>
          <button id="saveArticleBtn">Salva articolo</button>
        </div>
        <div id="articleStatus" class="status"></div>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr><th>Codice</th><th>Descrizione</th><th>Marca</th><th>Giacenza</th><th>Azioni</th></tr>
          </thead>
          <tbody id="articlesTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://aomvnfxupelnhxnoobve.supabase.co";
const SUPABASE_KEY = "sb_publishable_hnAKtehrOpSHDIXSCAwSOQ_eHZD4dXl";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = { clients: [], suppliers: [], articles: [] };
let editingClientId = null;
let editingSupplierId = null;
let editingArticleId = null;

function setStatus(id, text, cls = "") {
  const el = document.getElementById(id);
  el.className = "status " + cls;
  el.textContent = text || "";
}

function safe(v) {
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function toggleApp(logged) {
  document.getElementById("authView").classList.toggle("hidden", logged);
  document.getElementById("appView").classList.toggle("hidden", !logged);
}

async function boot() {
  const { data } = await client.auth.getSession();
  if (data.session) {
    document.getElementById("userEmail").textContent = data.session.user.email || "";
    toggleApp(true);
    await refreshAll();
  }
  client.auth.onAuthStateChange(async (_e, session) => {
    if (session) {
      document.getElementById("userEmail").textContent = session.user.email || "";
      toggleApp(true);
      await refreshAll();
    } else {
      toggleApp(false);
    }
  });
}

async function login() {
  setStatus("authStatus", "Accesso in corso...");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await client.auth.signInWithPassword({ email, password });
  if (error) {
    setStatus("authStatus", error.message, "error");
    return;
  }
  setStatus("authStatus", "Login effettuato.", "ok");
}

async function registerUser() {
  setStatus("authStatus", "Registrazione in corso...");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await client.auth.signUp({ email, password });
  if (error) {
    setStatus("authStatus", error.message, "error");
    return;
  }
  setStatus("authStatus", "Account creato. Ora fai login.", "ok");
}

async function logout() {
  await client.auth.signOut();
}

async function refreshAll() {
  await Promise.all([loadClients(), loadSuppliers(), loadArticles()]);
  renderClients();
  renderSuppliers();
  renderArticles();
  renderSupplierOptions();
}

async function loadClients() {
  const { data, error } = await client.from("clients").select("*").order("created_at", { ascending: false });
  if (error) { setStatus("clientStatus", error.message, "error"); return; }
  state.clients = data || [];
}

async function loadSuppliers() {
  const { data, error } = await client.from("suppliers").select("*").order("created_at", { ascending: false });
  if (error) { setStatus("supplierStatus", error.message, "error"); return; }
  state.suppliers = data || [];
}

async function loadArticles() {
  const { data, error } = await client.from("articles").select("*").order("created_at", { ascending: false });
  if (error) { setStatus("articleStatus", error.message, "error"); return; }
  state.articles = data || [];
}

function renderClients() {
  document.getElementById("clientsTable").innerHTML = state.clients.map(c => `
    <tr>
      <td>${safe(c.name)}</td>
      <td>${safe(c.type || "-")}</td>
      <td>${safe(c.phone || "-")}</td>
      <td>${safe(c.vat_number || "-")}</td>
      <td><button class="secondary small-btn" onclick="editClient('${c.id}')">Modifica</button></td>
    </tr>
  `).join("") || `<tr><td colspan="5">Nessun cliente</td></tr>`;
}

function renderSuppliers() {
  document.getElementById("suppliersTable").innerHTML = state.suppliers.map(s => `
    <tr>
      <td>${safe(s.name)}</td>
      <td>${safe(s.contact_name || "-")}</td>
      <td>${safe(s.phone || "-")}</td>
      <td>${safe(s.email || "-")}</td>
      <td><button class="secondary small-btn" onclick="editSupplier('${s.id}')">Modifica</button></td>
    </tr>
  `).join("") || `<tr><td colspan="5">Nessun fornitore</td></tr>`;
}

function renderArticles() {
  document.getElementById("articlesTable").innerHTML = state.articles.map(a => `
    <tr>
      <td>${safe(a.code)}</td>
      <td>${safe(a.description)}</td>
      <td>${safe(a.brand || "-")}</td>
      <td>${safe(a.stock)}</td>
      <td><button class="secondary small-btn" onclick="editArticle('${a.id}')">Modifica</button></td>
    </tr>
  `).join("") || `<tr><td colspan="5">Nessun articolo</td></tr>`;
}

function renderSupplierOptions() {
  document.getElementById("articleSupplier").innerHTML =
    `<option value="">Nessun fornitore</option>` +
    state.suppliers.map(s => `<option value="${s.id}">${safe(s.name)}</option>`).join("");
}

function editClient(id) {
  const c = state.clients.find(x => x.id === id);
  if (!c) return;
  editingClientId = id;
  document.getElementById("clientName").value = c.name || "";
  document.getElementById("clientType").value = c.type || "azienda";
  document.getElementById("clientPhone").value = c.phone || "";
  document.getElementById("clientVat").value = c.vat_number || "";
  document.getElementById("clientAddress").value = c.address || "";
  document.getElementById("clientSdi").value = c.sdi || "";
  setStatus("clientStatus", "Stai modificando questo cliente.", "warn");
}

function editSupplier(id) {
  const s = state.suppliers.find(x => x.id === id);
  if (!s) return;
  editingSupplierId = id;
  document.getElementById("supplierName").value = s.name || "";
  document.getElementById("supplierContact").value = s.contact_name || "";
  document.getElementById("supplierPhone").value = s.phone || "";
  document.getElementById("supplierEmail").value = s.email || "";
  document.getElementById("supplierVat").value = s.vat_number || "";
  setStatus("supplierStatus", "Stai modificando questo fornitore.", "warn");
}

function editArticle(id) {
  const a = state.articles.find(x => x.id === id);
  if (!a) return;
  editingArticleId = id;
  document.getElementById("articleCode").value = a.code || "";
  document.getElementById("articleDescription").value = a.description || "";
  document.getElementById("articleBrand").value = a.brand || "";
  document.getElementById("articleCategory").value = a.category || "";
  document.getElementById("articleUnit").value = a.unit || "pz";
  document.getElementById("articleStock").value = a.stock ?? "";
  document.getElementById("articleMinStock").value = a.min_stock ?? "";
  document.getElementById("articleSalePrice").value = a.sale_price_net ?? "";
  document.getElementById("articlePurchasePrice").value = a.purchase_price_net ?? "";
  document.getElementById("articleLastDate").value = a.last_purchase_date || "";
  document.getElementById("articleSupplier").value = a.last_supplier_id || "";
  setStatus("articleStatus", "Stai modificando questo articolo.", "warn");
}

async function saveClient() {
  setStatus("clientStatus", "Salvataggio...");
  const payload = {
    name: document.getElementById("clientName").value.trim(),
    type: document.getElementById("clientType").value,
    phone: document.getElementById("clientPhone").value.trim() || null,
    vat_number: document.getElementById("clientVat").value.trim() || null,
    address: document.getElementById("clientAddress").value.trim() || null,
    sdi: document.getElementById("clientSdi").value.trim() || null
  };
  if (!payload.name) {
    setStatus("clientStatus", "Inserisci il nome cliente.", "error");
    return;
  }

  let result;
  if (editingClientId) {
    result = await client.from("clients").update(payload).eq("id", editingClientId).select();
  } else {
    result = await client.from("clients").insert(payload).select();
  }

  if (result.error) {
    setStatus("clientStatus", result.error.message, "error");
    return;
  }

  editingClientId = null;
  ["clientName","clientPhone","clientVat","clientAddress","clientSdi"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("clientType").value = "azienda";
  setStatus("clientStatus", "Cliente salvato.", "ok");
  await loadClients();
  renderClients();
}

async function saveSupplier() {
  setStatus("supplierStatus", "Salvataggio...");
  const payload = {
    name: document.getElementById("supplierName").value.trim(),
    contact_name: document.getElementById("supplierContact").value.trim() || null,
    phone: document.getElementById("supplierPhone").value.trim() || null,
    email: document.getElementById("supplierEmail").value.trim() || null,
    vat_number: document.getElementById("supplierVat").value.trim() || null
  };
  if (!payload.name) {
    setStatus("supplierStatus", "Inserisci il nome fornitore.", "error");
    return;
  }

  let result;
  if (editingSupplierId) {
    result = await client.from("suppliers").update(payload).eq("id", editingSupplierId).select();
  } else {
    result = await client.from("suppliers").insert(payload).select();
  }

  if (result.error) {
    setStatus("supplierStatus", result.error.message, "error");
    return;
  }

  editingSupplierId = null;
  ["supplierName","supplierContact","supplierPhone","supplierEmail","supplierVat"].forEach(id => document.getElementById(id).value = "");
  setStatus("supplierStatus", "Fornitore salvato.", "ok");
  await loadSuppliers();
  renderSuppliers();
  renderSupplierOptions();
}

async function saveArticle() {
  setStatus("articleStatus", "Salvataggio...");
  const payload = {
    category: document.getElementById("articleCategory").value.trim() || "Generico",
    code: document.getElementById("articleCode").value.trim().toUpperCase(),
    description: document.getElementById("articleDescription").value.trim(),
    brand: document.getElementById("articleBrand").value.trim() || null,
    unit: document.getElementById("articleUnit").value.trim() || "pz",
    stock: Number(document.getElementById("articleStock").value || 0),
    min_stock: Number(document.getElementById("articleMinStock").value || 0),
    sale_price_net: Number(document.getElementById("articleSalePrice").value || 0),
    purchase_price_net: Number(document.getElementById("articlePurchasePrice").value || 0),
    last_purchase_date: document.getElementById("articleLastDate").value || null,
    last_supplier_id: document.getElementById("articleSupplier").value || null
  };

  if (!payload.code || !payload.description) {
    setStatus("articleStatus", "Inserisci codice e descrizione.", "error");
    return;
  }

  let result;
  if (editingArticleId) {
    result = await client.from("articles").update(payload).eq("id", editingArticleId).select();
  } else {
    result = await client.from("articles").insert(payload).select();
  }

  if (result.error) {
    setStatus("articleStatus", result.error.message, "error");
    return;
  }

  editingArticleId = null;
  ["articleCode","articleDescription","articleBrand","articleCategory","articleStock","articleMinStock","articleSalePrice","articlePurchasePrice","articleLastDate"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("articleUnit").value = "pz";
  document.getElementById("articleSupplier").value = "";
  setStatus("articleStatus", "Articolo salvato.", "ok");
  await loadArticles();
  renderArticles();
}

function addPurchaseRow() {
  alert("La parte completa del carico merce resta in questo file, ma prima verifichiamo che clienti, fornitori e articoli salvino correttamente.");
}

function updatePurchaseEditorRow() {}
function removePurchaseEditorRow() {}
function addArticleToJob() {}
function updateJobEditorRow() {}
function removeJobEditorRow() {}

document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("registerBtn").addEventListener("click", registerUser);
document.getElementById("logoutBtn").addEventListener("click", logout);
document.getElementById("refreshAllBtn").addEventListener("click", refreshAll);
document.getElementById("exportBtn").addEventListener("click", () => alert("Export già pronto da completare nella prossima passata"));
document.getElementById("saveClientBtn").addEventListener("click", saveClient);
document.getElementById("saveSupplierBtn").addEventListener("click", saveSupplier);
document.getElementById("saveVehicleBtn").addEventListener("click", saveVehicle);
document.getElementById("saveOperatorBtn").addEventListener("click", saveOperator);
document.getElementById("saveArticleBtn").addEventListener("click", saveArticle);
document.getElementById("addPurchaseRowBtn").addEventListener("click", addPurchaseRow);
document.getElementById("jobClient").addEventListener("change", renderJobSelectors);
document.getElementById("jobType").addEventListener("change", renderJobSelectors);
document.getElementById("jobArticleSearch").addEventListener("input", renderJobMatches);
document.getElementById("purchaseFilterMonth").addEventListener("change", renderPurchaseHistory);
document.getElementById("purchaseFilterSupplier").addEventListener("change", renderPurchaseHistory);

window.editClient = editClient;
window.editSupplier = editSupplier;
window.editArticle = editArticle;

boot();
  </script>
</body>
</html>
